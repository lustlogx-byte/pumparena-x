<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>PumpArena X | Pro Trader</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --panel: #111422;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent: #8b5cf6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --up: #22c55e;
            --down: #ef4444;
            --gold: #f0b90b;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px 15px;
            background: linear-gradient(to bottom, #0a0c16, transparent);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .brand {
            font-weight: 900;
            font-size: 22px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: var(--accent);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 9999;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        #notification.show { transform: translateX(-50%) translateY(0); }

        .tab { display: none; padding: 0 16px; animation: slideUp 0.4s ease-out; }
        .tab.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--panel);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .list-item:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }

        .price-up { color: var(--up) !important; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .price-down { color: var(--down) !important; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        select, input {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #2d314d;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            margin-bottom: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 16px; font-weight: 800; transition: 0.1s; font-size: 14px; }
        .action-btn:active { transform: scale(0.95); }
        .buy { background: var(--up); color: #000; }
        .sell { background: var(--down); color: #fff; }

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: rgba(10, 12, 22, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 10px 0 calc(20px + env(safe-area-inset-bottom));
            z-index: 1000;
        }

        .nav-item { flex: 1; background: none; border: none; color: var(--text-dim); font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--accent); }
        .dot { width: 4px; height: 4px; background: transparent; border-radius: 50%; }
        .active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body>

    <div id="notification">Target Hit! 🚀</div>

    <header>
        <div class="brand">PUMP ARENA X</div>
        <div id="userLabel" style="font-size: 11px; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px;">PRO TRADER</div>
    </header>

    <div id="marketsTab" class="tab active">
        <h2 style="margin:0 0 20px 0;">Markets</h2>
        <div id="marketList"></div>
    </div>

    <div id="chartTab" class="tab">
        <div class="card" style="height: 450px; padding: 8px;">
            <div id="chart-container" style="height: 100%; border-radius: 16px; overflow: hidden;"></div>
        </div>
    </div>

    <div id="tradeTab" class="tab">
        <div class="card">
            <select id="coinSelect" onchange="syncCoinSelection(this.value)"></select>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="action-btn buy" onclick="executeTrade('buy')">BUY</button>
                <button class="action-btn sell" onclick="executeTrade('sell')">SELL</button>
            </div>
            <input id="qtyInput" type="number" placeholder="Enter Amount" oninput="updateUI()">
            
            <div style="display:flex; gap:8px;">
                <button onclick="setPercent(25)" style="flex:1; padding:10px; background:#1e233d; border:none; color:#fff; border-radius:10px;">25%</button>
                <button onclick="setPercent(100)" style="flex:1; padding:10px; background:#1e233d; border:none; color:#fff; border-radius:10px;">MAX</button>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:var(--text-dim)">Market Price</span>
                <span id="displayPrice" style="font-family:monospace; font-weight:700;">$0.00</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:18px;">
                <span>Order Total</span>
                <span id="displayTotal" style="color:var(--accent)">$0.00</span>
            </div>
        </div>
    </div>

    <div id="portfolioTab" class="tab">
        <div id="balanceDisplay"></div>
        <div class="card">
            <h3 style="margin-top:0; font-size:16px;">Activity History</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="settingsTab" class="tab">
        <h2 style="margin:0 0 20px 0;">Admin Panel</h2>

        <div class="card">
            <h3 style="margin-top:0; font-size:16px;">Wallet Settings</h3>
            <label style="font-size:11px; color:var(--text-dim); display:block; margin-bottom:8px;">SET CUSTOM BALANCE ($)</label>
            <div style="display:flex; gap:10px;">
                <input id="adminBalanceInput" type="number" placeholder="e.g. 50000" style="margin:0;">
                <button onclick="adminSetBalance()" style="background:var(--accent); color:white; border:none; border-radius:16px; padding:0 20px; font-weight:bold;">SET</button>
            </div>
        </div>

        <div class="card" style="border-color: rgba(239, 68, 68, 0.2);">
            <h3 style="margin-top:0; font-size:16px; color:var(--down);">Danger Zone</h3>
            <p style="font-size:12px; color:var(--text-dim); margin-top:0;">Resetting will wipe all open assets, order histories, and set your balance back to $10,000.</p>
            <button onclick="adminResetApp()" class="action-btn" style="background:var(--down); color:white; width:100%;">FACTORY RESET APP</button>
        </div>
    </div>

    <nav class="navbar">
        <button class="nav-item active" onclick="switchTab('marketsTab', this)">MARKETS<div class="dot"></div></button>
        <button class="nav-item" onclick="switchTab('chartTab', this)">CHART<div class="dot"></div></button>
        <button class="nav-item" onclick="switchTab('tradeTab', this)">TRADE<div class="dot"></div></button>
        <button class="nav-item" onclick="switchTab('portfolioTab', this)">ASSETS<div class="dot"></div></button>
        <button class="nav-item" onclick="switchTab('settingsTab', this)">ADMIN<div class="dot"></div></button>
    </nav>

    <script>
        // Setup initial default state
        const DEFAULT_STATE = {
            balance: 10000.00,
            portfolio: {},
            history: [],
            activeSymbol: "BTCUSDT"
        };

        let state = JSON.parse(localStorage.getItem('pumpArenaState')) || {...DEFAULT_STATE};

        let lastPrices = {};
        const coins = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "ADAUSDT"];

        function init() {
            const select = document.getElementById("coinSelect");
            select.innerHTML = ""; // Clear
            coins.forEach(c => select.add(new Option(c, c)));
            select.value = state.activeSymbol;
            
            fetchPrices();
            setInterval(fetchPrices, 3000);
            renderHistory();
            loadChart();
        }

        async function fetchPrices() {
            try {
                const res = await fetch("https://api.binance.com/api/v3/ticker/price");
                const data = await res.json();
                const newPrices = {};
                data.forEach(item => { if(coins.includes(item.symbol)) newPrices[item.symbol] = parseFloat(item.price); });
                
                renderMarkets(newPrices);
                lastPrices = {...newPrices};
                updateUI();
            } catch (e) { console.error("Price API Error"); }
        }

        function renderMarkets(prices) {
            const list = document.getElementById("marketList");
            list.innerHTML = coins.map(c => {
                const p = prices[c] || 0;
                const trend = p > lastPrices[c] ? 'price-up' : (p < lastPrices[c] ? 'price-down' : '');
                return `
                    <div class="list-item" onclick="syncCoinSelection('${c}')">
                        <div>
                            <div style="font-weight:800;">${c.replace('USDT','')}</div>
                            <div style="font-size:10px; color:var(--text-dim)">Binance Live</div>
                        </div>
                        <div class="${trend}" style="font-family:monospace; font-weight:700;">$${p.toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }

        function syncCoinSelection(symbol) {
            state.activeSymbol = symbol;
            document.getElementById("coinSelect").value = symbol;
            loadChart();
            
            if (document.getElementById("marketsTab").classList.contains("active")) {
                switchTab('chartTab', document.querySelectorAll('.nav-item')[1]);
            }
            save();
        }

        function loadChart() {
            const container = document.getElementById("chart-container");
            container.innerHTML = "";
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + state.activeSymbol,
                "interval": "30",
                "theme": "dark",
                "style": "1",
                "hide_top_toolbar": true,
                "container_id": "chart-container"
            });
        }

        function executeTrade(type) {
            const sym = state.activeSymbol;
            const price = lastPrices[sym];
            const qty = parseFloat(document.getElementById("qtyInput").value) || 0;
            const cost = qty * price;

            if (qty <= 0) return;

            if (type === 'buy' && state.balance >= cost) {
                state.balance -= cost;
                state.portfolio[sym] = (state.portfolio[sym] || 0) + qty;
                logHistory('buy', sym, qty, price);
                notify(`Bought ${qty} ${sym.replace('USDT','')}`);
            } else if (type === 'sell' && (state.portfolio[sym] || 0) >= qty) {
                state.balance += cost;
                state.portfolio[sym] -= qty;
                logHistory('sell', sym, qty, price);
                notify(`Sold ${qty} ${sym.replace('USDT','')}`);
            } else {
                notify("Insufficient funds or assets!");
            }
            document.getElementById("qtyInput").value = "";
            save();
        }

        function logHistory(type, symbol, qty, price) {
            state.history.unshift({ type, symbol, qty, price, time: new Date().toLocaleTimeString() });
            if (state.history.length > 10) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            document.getElementById("historyList").innerHTML = state.history.length ? state.history.map(h => `
                <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px;">
                    <span style="color:${h.type==='buy'?'var(--up)':'var(--down)'}; font-weight:bold;">${h.type.toUpperCase()} ${h.symbol.replace('USDT','')}</span>
                    <span style="font-weight:600;">$${(h.qty*h.price).toFixed(2)}</span>
                </div>
            `).join('') : '<div style="color:var(--text-dim); text-align:center; padding:20px;">No trades yet</div>';
        }

        function updateUI() {
            const p = lastPrices[state.activeSymbol] || 0;
            document.getElementById("displayPrice").innerText = `$${p.toLocaleString()}`;
            const qty = parseFloat(document.getElementById("qtyInput").value) || 0;
            document.getElementById("displayTotal").innerText = `$${(qty * p).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            let totalVal = 0;
            Object.keys(state.portfolio).forEach(k => totalVal += (state.portfolio[k] * (lastPrices[k] || 0)));
            document.getElementById("balanceDisplay").innerHTML = `
                <div class="card" style="background: linear-gradient(135deg, #1e233d, #05070a);">
                    <div style="color:var(--text-dim); font-size:12px; letter-spacing:1px;">PORTFOLIO VALUE</div>
                    <div style="font-size:32px; font-weight:900; margin:8px 0;">$${(state.balance + totalVal).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    <div style="font-size:12px;"><span style="color:var(--text-dim)">Wallet:</span> $${state.balance.toFixed(2)}</div>
                </div>
            `;
        }

        function notify(msg) {
            const n = document.getElementById("notification");
            n.innerText = msg; n.classList.add("show");
            setTimeout(() => n.classList.remove("show"), 3000);
        }

        function save() { localStorage.setItem('pumpArenaState', JSON.stringify(state)); updateUI(); }

        function switchTab(id, el) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
            el.classList.add("active");
            if(id === 'chartTab') loadChart();
        }

        function setPercent(p) {
            const price = lastPrices[state.activeSymbol] || 1;
            document.getElementById("qtyInput").value = ((state.balance * (p/100)) / price).toFixed(4);
            updateUI();
        }

        // ================= ADMIN CONTROLS =================
        function adminSetBalance() {
            const customAmt = parseFloat(document.getElementById("adminBalanceInput").value);
            if (isNaN(customAmt) || customAmt < 0) {
                notify("Please enter a valid amount!");
                return;
            }
            state.balance = customAmt;
            document.getElementById("adminBalanceInput").value = "";
            notify(`Balance updated to $${customAmt.toLocaleString()}!`);
            save();
        }

        function adminResetApp() {
            if (confirm("Are you sure you want to reset your account? This will wipe your clean slate!")) {
                state = {
                    balance: 10000.00,
                    portfolio: {},
                    history: [],
                    activeSymbol: "BTCUSDT"
                };
                save();
                renderHistory();
                notify("Account reset to Factory Default! 🧼");
                
                // Jump to markets to see your clean slate
                switchTab('marketsTab', document.querySelectorAll('.nav-item')[0]);
            }
        }

        init();
    </script>
</body>
</html>
